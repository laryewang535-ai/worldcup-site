name = "sync-matches-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Fetch from football-data every 3 minutes and write matches.json to R2.
[triggers]
crons = ["*/3 * * * *"]

# R2 binding. Before deployment, change bucket_name to your bucket name.
[[r2_buckets]]
binding = "MATCHES_BUCKET"
bucket_name = "worldcup-matches"

[vars]
FOOTBALL_DATA_COMPETITION_CODE = "WC"

# Optional validation for manual triggers. When set, POST requires Authorization: Bearer <value>.
# SYNC_TRIGGER_TOKEN = ""
