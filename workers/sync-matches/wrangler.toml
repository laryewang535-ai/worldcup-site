name = "sync-matches-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

# 每 3 分钟从 football-data 拉取并写入 R2 matches.json
[triggers]
crons = ["*/3 * * * *"]

# 绑定 R2；部署前请将 bucket_name 改成你的 Bucket 名称
[[r2_buckets]]
binding = "MATCHES_BUCKET"
bucket_name = "worldcup-matches"

[vars]
FOOTBALL_DATA_COMPETITION_CODE = "WC"

# 可选：手动触发时校验（留空则仅 Cron 可写 R2，POST 需带 Authorization: Bearer <值>）
# SYNC_TRIGGER_TOKEN = ""
